name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go vet ./internal/... ./pkg/... ./cmd/...
      - run: |
          if command -v staticcheck &>/dev/null; then
            staticcheck ./internal/... ./pkg/... ./cmd/...
          fi

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go test -race -count=1 -timeout 120s ./internal/... ./pkg/...

  build:
    name: Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go build -tags default -ldflags="-s -w" -o muxcored ./cmd/muxcored

  vulncheck:
    name: Vulnerability Scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck -show verbose ./...
