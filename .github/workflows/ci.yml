name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go vet ./internal/... ./pkg/... ./cmd/...
      - name: Install and run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          "$(go env GOPATH)/bin/staticcheck" ./internal/... ./pkg/... ./cmd/...

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go test -race -count=1 -timeout 120s ./internal/... ./pkg/...

  build:
    name: Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Clone module dependencies
        run: |
          rm -rf ../modules
          mkdir -p ../modules
          git clone --depth 1 https://github.com/Muxcore-Media/admin-ui.git ../modules/admin-ui
          git clone --depth 1 https://github.com/Muxcore-Media/api-rest.git ../modules/api-rest
          git clone --depth 1 https://github.com/Muxcore-Media/scheduler-cron.git ../modules/scheduler-cron
      - run: go build -tags default -ldflags="-s -w" -o muxcored ./cmd/muxcored

  vulncheck:
    name: Vulnerability Scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck -show verbose ./...
