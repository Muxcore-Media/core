<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}MuxCore{{end}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
                            300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
                            600: '#4f46e5', 700: '#4338ca', 800: '#3730a3',
                            900: '#312e81', 950: '#1e1b4b',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full">
    <div class="flex h-full">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col">
            <div class="p-4 border-b border-gray-800">
                <a href="/" class="text-xl font-bold text-brand-400">MuxCore</a>
                <p class="text-xs text-gray-500 mt-1">Media Orchestration</p>
            </div>
            <nav class="flex-1 p-3 space-y-1" hx-boost="true">
                <a href="/" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition-colors">
                    Dashboard
                </a>
                <a href="/modules" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition-colors">
                    Modules
                </a>
                <a href="/api/v1/modules" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition-colors" target="_api">
                    API → /api/v1
                </a>
            </nav>
            <div class="p-3 border-t border-gray-800 text-xs text-gray-600" id="system-status"
                 hx-get="/health" hx-trigger="every 30s">
                System: --
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 overflow-auto">
            {{block "content" .}}{{end}}
        </main>
    </div>
</body>
</html>
